<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experiment 5 – Student Registration Form</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #dfe6e9; margin: 0; padding: 30px; }
    .card { background: #fff; max-width: 580px; margin: 0 auto; padding: 32px; border-radius: 10px; box-shadow: 0 4px 18px rgba(0,0,0,0.13); }
    h1 { text-align: center; color: #6c3483; margin-bottom: 4px; }
    p.sub { text-align: center; color: #999; margin-bottom: 24px; font-size: 0.9rem; }
    label { display: block; margin-bottom: 4px; font-weight: bold; color: #2d3436; font-size: 0.9rem; }
    input[type="text"], input[type="email"], input[type="password"],
    input[type="tel"], input[type="date"], select {
      width: 100%; padding: 10px 12px; margin-bottom: 16px;
      border: 1px solid #b2bec3; border-radius: 6px; font-size: 0.95rem;
    }
    input:focus, select:focus { outline: none; border-color: #6c3483; box-shadow: 0 0 0 2px #e8daef; }
    .row { display: flex; gap: 14px; }
    .row > div { flex: 1; }
    .radio-group, .checkbox-group { display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
    .radio-group label, .checkbox-group label { font-weight: normal; display: flex; align-items: center; gap: 6px; }
    .error-hint { font-size: 0.78rem; color: #e74c3c; margin-top: -12px; margin-bottom: 12px; display: none; }
    input:invalid:not(:placeholder-shown) + .error-hint { display: block; }
    .btn { width: 100%; padding: 12px; background: #6c3483; color: #fff; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; margin-top: 6px; }
    .btn:hover { background: #5b2c6f; }
    .divider { border: none; border-top: 1px solid #ecf0f1; margin: 18px 0; }
  </style>
</head>
<body>

  <div class="card">
    <h1>🎓 Student Registration</h1>
    <p class="sub">Government Engineering College — Enrollment Form</p>

    <!-- method and action attributes demonstrated -->
    <form action="#" method="post" novalidate>

      <!-- Personal Info -->
      <div class="row">
        <div>
          <label for="fname">First Name *</label>
          <input type="text" id="fname" name="fname" placeholder="Rahul" required />
        </div>
        <div>
          <label for="lname">Last Name *</label>
          <input type="text" id="lname" name="lname" placeholder="Sharma" required />
        </div>
      </div>

      <label for="dob">Date of Birth *</label>
      <input type="date" id="dob" name="dob" required />

      <!-- Gender radio buttons -->
      <label>Gender *</label>
      <div class="radio-group">
        <label><input type="radio" name="gender" value="male" required /> Male</label>
        <label><input type="radio" name="gender" value="female" /> Female</label>
        <label><input type="radio" name="gender" value="other" /> Other</label>
      </div>

      <hr class="divider" />

      <!-- Contact Info -->
      <label for="email">Email Address *</label>
      <!-- email type triggers browser built-in email format validation -->
      <input type="email" id="email" name="email" placeholder="student@example.com" required />
      <span class="error-hint">Please enter a valid email address.</span>

      <label for="phone">Mobile Number *</label>
      <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210"
             pattern="[0-9+\s\-]{10,15}" required />
      <span class="error-hint">Enter a valid 10-digit mobile number.</span>

      <hr class="divider" />

      <!-- Academic Info -->
      <label for="branch">Branch *</label>
      <select id="branch" name="branch" required>
        <option value="">-- Select Branch --</option>
        <option value="cse">Computer Science Engineering</option>
        <option value="ece">Electronics &amp; Communication</option>
        <option value="mech">Mechanical Engineering</option>
        <option value="civil">Civil Engineering</option>
        <option value="it">Information Technology</option>
      </select>

      <label for="year">Current Year *</label>
      <select id="year" name="year" required>
        <option value="">-- Select Year --</option>
        <option value="1">First Year</option>
        <option value="2">Second Year</option>
        <option value="3">Third Year</option>
        <option value="4">Fourth Year</option>
      </select>

      <label for="rollno">Roll Number *</label>
      <input type="text" id="rollno" name="rollno" placeholder="e.g. 23CSE045" required />

      <hr class="divider" />

      <!-- Password -->
      <label for="password">Create Password *</label>
      <input type="password" id="password" name="password"
             placeholder="Min 8 characters" minlength="8" required />

      <!-- Interests checkboxes -->
      <label style="margin-bottom:8px;">Areas of Interest</label>
      <div class="checkbox-group">
        <label><input type="checkbox" name="interest" value="web" /> Web Design</label>
        <label><input type="checkbox" name="interest" value="ai" /> AI/ML</label>
        <label><input type="checkbox" name="interest" value="mobile" /> Mobile Apps</label>
        <label><input type="checkbox" name="interest" value="data" /> Data Science</label>
      </div>

      <!-- Terms -->
      <label>
        <input type="checkbox" name="terms" required />
        &nbsp;I agree to the <a href="#">Terms &amp; Conditions</a> *
      </label>
      <br /><br />

      <button type="submit" class="btn">Register Now</button>
    </form>
  </div>

</body>
</html>
